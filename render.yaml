services:
  - type: web
    name: xlimax-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_KEY_B64
        sync: false        # se carga a mano en el dashboard de Render
    plan: free
